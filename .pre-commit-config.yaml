repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Run the remaining gates (strict types, dead code) through the project venv so
  # a commit can never land with type errors or dead code — CI just double-checks.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict)
        entry: .venv/bin/python -m mypy src tests scripts
        language: system
        pass_filenames: false
        always_run: true
      - id: vulture
        name: vulture (dead code)
        entry: .venv/bin/python -m vulture
        language: system
        pass_filenames: false
        always_run: true
