name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  QT_QPA_PLATFORM: offscreen
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  release:
    name: Build & publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Quality gates
        run: |
          ruff format --check .
          ruff check .
          mypy src tests scripts
          pytest
      - name: Verify tag matches package version
        run: |
          pkg_version=$(python -c "import bluranything; print(bluranything.__version__)")
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match __version__ $pkg_version" >&2
            exit 1
          fi
      - name: Build distributions
        run: python -m build
      - name: Extract release notes from changelog
        run: python scripts/release_notes.py "${GITHUB_REF_NAME#v}" > release-notes.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "BLURAnything ${GITHUB_REF_NAME#v}" \
            --notes-file release-notes.md
