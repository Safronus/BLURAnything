name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open image …
        2. Drag over …
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: BLURAnything version
      placeholder: "0.1.0 (bluranything --version)"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system & Python version
      placeholder: "macOS 15.5, Python 3.12"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      render: shell
